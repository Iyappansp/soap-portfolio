<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">
<head>
  <link rel="icon" type="image/png" href="assets/fav.png">

  <title>Page Not Found — Naturelle Supply Co</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .err-hero{min-height:100svh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem;background:var(--bg);position:relative;overflow:hidden;}
    .err-num{font-family:var(--font-display);font-size:clamp(8rem,20vw,16rem);font-weight:700;line-height:1;color:transparent;-webkit-text-stroke:2px var(--primary);opacity:.12;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;user-select:none;}
    .err-content{position:relative;z-index:1;}
    .soap-bounce{animation:soapb 2s ease-in-out infinite;display:inline-block;}
    @keyframes soapb{0%,100%{transform:translateY(0) rotate(-5deg);}50%{transform:translateY(-20px) rotate(5deg);}}
    .bubble-anim{position:absolute;border-radius:50%;pointer-events:none;animation:bubrise var(--dur,8s) ease-in infinite;opacity:0;}
    @keyframes bubrise{0%{opacity:0;transform:translateY(0) scale(.5);}10%{opacity:.6;}90%{opacity:.2;}100%{opacity:0;transform:translateY(-100vh) scale(1.2);}}
  </style>
</head>
<body>
<header id="main-header"></header>

<div class="err-hero" id="err-bg">
  <div class="err-num">404</div>

  <!-- Animated bubbles -->
  <div class="bubble-anim" style="width:60px;height:60px;background:rgba(201,138,91,.15);left:10%;bottom:0;--dur:7s;animation-delay:0s;"></div>
  <div class="bubble-anim" style="width:35px;height:35px;background:rgba(244,228,212,.3);left:25%;bottom:0;--dur:9s;animation-delay:-2s;"></div>

  <div class="bubble-anim" style="width:25px;height:25px;background:rgba(201,138,91,.2);left:90%;bottom:0;--dur:6s;animation-delay:-3s;"></div>
  <div class="bubble-anim" style="width:55px;height:55px;background:rgba(201,138,91,.12);left:40%;bottom:0;--dur:10s;animation-delay:-5s;"></div>

  <div class="err-content" data-reveal="up">

    <div class="d-flex flex-wrap gap-3 justify-content-center mb-5">
      <a href="index.html" class="btn btn-primary btn-lg">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Back to Home
      </a>
      <a href="products.html" class="btn btn-secondary btn-lg">Browse Products</a>
    </div>

    <!-- Quick links -->
    <div style="display:flex;flex-wrap:wrap;gap:.6rem;justify-content:center;">
      <a href="soaps.html" class="chip">🧼 Soaps</a>
      <a href="bath-bombs.html" class="chip">💣 Bath Bombs</a>
      <a href="wholesale-program.html" class="chip">📦 Wholesale</a>
      <a href="private-label.html" class="chip">🏷️ Private Label</a>
      <a href="contact.html" class="chip">💬 Contact</a>
    </div>
  </div>
</div>

<footer id="main-footer"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/main.js"></script>

</html>
