<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Naturelle Supply Co</title>
  <meta name="description" content="Access your Naturelle Supply Co wholesale and private label partner account.">
  <link rel="canonical" href="login.html">
  <link rel="icon" type="image/png" href="assets/fav.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

  <!-- Loader -->
  <div id="ns-loader">
    <div class="loader-inner">
      <div class="loader-ring"></div>
      <p class="loader-wordmark">Naturelle</p>
    </div>
  </div>

  <div class="auth-wrapper" style="background: url('assets/img/artisan_craft.png') center/cover no-repeat;">

    <!-- Positioned controls outside container -->
    <div class="auth-page-ctrls">
      <button class="nav-ctrl-btn" id="theme-toggle" aria-label="Toggle theme" title="Toggle dark/light mode">
        <svg id="ico-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
        </svg>
        <svg id="ico-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <circle cx="12" cy="12" r="5" />
          <line x1="12" y1="1" x2="12" y2="3" />
          <line x1="12" y1="21" x2="12" y2="23" />
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
          <line x1="1" y1="12" x2="3" y2="12" />
          <line x1="21" y1="12" x2="23" y2="12" />
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
        </svg>
      </button>
      <button class="nav-ctrl-btn" id="rtl-toggle" aria-label="Toggle RTL"
        title="Toggle RTL/LTR layout">RTL</button>
    </div>

    <!-- Centered vertical forms card -->
    <div class="auth-form-panel">
      <!-- Logo inside card -->
      <a href="index.html" class="auth-logo">
        <img src="assets/logo1.png" alt="Naturelle Logo" class="logo-img auth-logo-img">
      </a>

      <!-- Form container -->
      <div class="auth-form-container">
        <div class="mb-4">
          <h1 class="auth-title">Welcome Back</h1>
          <p class="auth-subtitle">Sign in to manage your wholesale partner account.</p>
        </div>

        <form data-validate>
          <div class="form-row">
            <label class="ns-label" for="login-email">Business Email *</label>
            <input class="ns-input" type="email" id="login-email" placeholder="name@business.com" required>
          </div>

          <div class="form-row">
            <label class="ns-label mb-1" for="login-pass">Password *</label>
            <div class="pass-input-container">
              <input class="ns-input" type="password" id="login-pass" placeholder="••••••••" required>
              <button type="button" class="pass-toggle-btn" aria-label="Toggle password visibility">
                <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
                <svg class="eye-icon-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                  <line x1="1" y1="1" x2="23" y2="23"></line>
                </svg>
              </button>
            </div>
          </div>

          <div class="form-row d-flex justify-content-between align-items-center mb-4">
            <div class="d-flex align-items-center gap-2">
              <input type="checkbox" id="remember"
                style="accent-color: var(--primary); cursor: pointer; width: 16px; height: 16px;">
              <label for="remember"
                style="font-size: .85rem; color: var(--text-sub); cursor: pointer; user-select: none; font-family: var(--font-ui); margin-bottom: 0;">Remember
                this device</label>
            </div>
            <a href="coming-soon.html"
              style="font-size: .85rem; color: var(--primary); font-family: var(--font-ui); font-weight: 500; text-decoration: none;">Forgot
              password?</a>
          </div>

          <button type="submit" class="btn btn-primary btn-lg w-100 mb-2">Sign In</button>
        </form>

        <div class="social-auth-divider">or continue with</div>
        <div class="social-auth-btns">
          <button class="social-btn" aria-label="Sign in with Google" title="Sign in with Google">
            <svg viewBox="0 0 24 24">
              <path
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                fill="#4285F4" />
              <path
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                fill="#34A853" />
              <path
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"
                fill="#FBBC05" />
              <path
                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                fill="#EA4335" />
            </svg>
          </button>
          <button class="social-btn" aria-label="Sign in with Facebook" title="Sign in with Facebook">
            <svg viewBox="0 0 24 24">
              <path
                d="M22 12c0-5.52-4.48-10-10-10S2 6.48 2 12c0 4.84 3.44 8.87 8 9.8V15H8v-3h2V9.5C10 7.57 11.57 6 13.5 6H16v3h-2c-.55 0-1 .45-1 1v2h3v3h-3v6.95c4.56-.93 8-4.96 8-9.75z"
                fill="#1877F2" />
            </svg>
          </button>
          <button class="social-btn" aria-label="Sign in with Apple" title="Sign in with Apple">
            <svg viewBox="0 0 24 24">
              <path
                d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M15.97 4.17c.66-.81 1.11-1.93.99-3.06-1 .04-2.2.67-2.92 1.51-.62.73-1.16 1.87-1.01 2.98 1.1.09 2.22-.59 2.94-1.43z"
                fill="currentColor" />
            </svg>
          </button>
        </div>

        <p class="body-sm text-center text-sub mt-4">
          Don't have a partner account?
          <a href="signup.html" style="color: var(--primary); font-weight: 600; text-decoration: underline;">Sign In</a>
        </p>
      </div>

      <div class="auth-footer">
        © 2026 Naturelle Supply Co. All rights reserved.
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/main.js"></script>
</body>

</html>
